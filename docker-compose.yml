services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graph-rag-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-neo4jpassword} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graph-rag-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      HF_TOKEN: ${HF_TOKEN}
      HF_MODEL_ID: ${HF_MODEL_ID:-google/gemma-4-31b-it}
      ARXIV_METADATA_DIR: ${ARXIV_METADATA_DIR:-docs/arxiv/metadata}
      ARXIV_ABSTRACTS_DIR: ${ARXIV_ABSTRACTS_DIR:-docs/arxiv/abstracts}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-64}
    volumes:
      - ./docs:/app/docs:ro
      - ./project-docs:/app/project-docs:ro
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graph-rag-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
      VITE_BACKEND_PROXY_TARGET: ${VITE_BACKEND_PROXY_TARGET:-http://backend:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
